<div class="app-container">
    <app-cabecera></app-cabecera>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>

    <!-- El botón de volver para arriba que esté disponible en todas los componentes que se usen -->
    <p-scrollTop 
        target="window" 
        icon="pi pi-arrow-up" 
        [threshold]="500"
        styleClass="acrilico"
        [buttonProps]="{
            severity: 'primary',
            rounded: true,
            outlined: false
        }" 
    />

    <app-pie></app-pie>
</div>

<!-- Toast que mostrará la app -->
 <p-toast position="bottom-center"></p-toast>
